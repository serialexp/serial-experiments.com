{{ define "title" }}
    {{.Title}}
{{ end }}

{{ define "main" }}
<main>
    <article>
        <header>
            <h1>{{.Title}}</h1>
        </header>
        <!-- "{{.Content}}" pulls from the markdown content of the corresponding _index.md -->
        {{.Content}}
    </article>
    <ul>
    <!-- Ranges through content/posts/*.md -->
    {{ range .Pages }}
        <li>
            <a href="{{.Permalink}}"><time>{{.Date.Format "Jan 2, 2006"}}</time>: <strong>{{.Title}}</strong></a>
        </li>
    {{ end }}
    </ul>
</main>
{{ end }}
