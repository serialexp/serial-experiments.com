{{ define "main" }}
    <main aria-role="main">
      <header>
        <h1>{{.Title}}</h1>
        {{ with .Params.subtitle }}
        <span class="subtitle">{{.}}</span>
        {{ end }}
        <time>{{ .Date.Format "Jan 2, 2006" }}</time>
        <br />
      </header>
      <div class="homepage-content">
        <!-- Note that the content for index.html, as a sort of list page, will pull from content/_index.md -->
        {{.Content}}
      </div>
      <div>---<br /><br /></div>
      <div>{{with .Next}}<a href="{{.Permalink}}">Next Post</a><br /><br />{{end}}</div>
      <div>{{with .Prev}}<a href="{{.Permalink}}">Previous Post</a><br /><br />{{end}}</div>
    </main>
{{ end }}
