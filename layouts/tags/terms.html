{{ define "title" }}
    {{.Title}}
{{ end }}

{{ define "main" }}
<main>
    <article>
        <header>
            <h1>{{.Title}}</h1>
        </header>
        <!-- "{{.Content}}" pulls from the markdown content of the corresponding _index.md -->
        {{.Content}}
    </article>
    <ul>
    <!-- Ranges through content/posts/*.md -->
        {{ range .Site.Taxonomies.tags }}
                <li><a href="{{ .Page.Permalink }}">{{ .Page.Title }} {{ .Count }}</a></li>
        {{ end }}
    </ul>
</main>
{{ end }}
