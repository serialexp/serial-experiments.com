name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: depot/setup-action@v1

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag as :latest on every main push, plus the version + major.minor
      # tags when a v* tag is being released. Mirrors the gothab pattern so
      # downstream consumers (Portainer stack, manual `docker pull`) get the
      # same shape regardless of which repo it came from.
      - name: Determine tags
        id: meta
        run: |
          TAGS="serialexp/serial-experiments-com:latest"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            TAGS="$TAGS,serialexp/serial-experiments-com:${VERSION}"
            MAJOR_MINOR=$(echo $VERSION | cut -d. -f1-2)
            TAGS="$TAGS,serialexp/serial-experiments-com:${MAJOR_MINOR}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: depot/build-push-action@v1
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
